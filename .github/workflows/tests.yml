name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Create required directories
        run: |
          mkdir -p logs instance
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov Pillow bandit
      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing

      - name: Run bandit
        run: bandit -r . -c .bandit.yaml

      - name: Run grep for leftover config.get
        run: |
          LEFT=$(grep -rIn "current_app\.config\.get(" blueprints/ services/ core/ || true)
          if [ -n "$LEFT" ]; then
            echo "Найдены остатки current_app.config.get:"
            echo "$LEFT"
            exit 1
          fi
