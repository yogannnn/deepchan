name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: Create required directories
        run: |
          mkdir -p logs instance
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov Pillow bandit pip-audit
        timeout-minutes: 10
      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing
        timeout-minutes: 15

      - name: Check dependencies with pip-audit
        timeout-minutes: 5
        run: |
          pip-audit --desc || true
        timeout-minutes: 5
        continue-on-error: true

      - name: Run bandit
        run: bandit -r . -c .bandit.yaml -ll
        timeout-minutes: 5

      - name: Run grep for leftover config.get
        run: |
          LEFT=$(grep -rIn "current_app\.config\.get(" blueprints/ services/ core/ || true)
          if [ -n "$LEFT" ]; then
            echo "Найдены остатки current_app.config.get:"
            echo "$LEFT"
            exit 1
          fi
        timeout-minutes: 2
