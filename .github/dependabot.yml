version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    target-branch: "main"
    labels:
      - "dependencies"
    groups:
      flask:
        patterns:
          - "flask*"
          - "Flask*"
          - "Werkzeug*"
          - "Jinja2*"
          - "MarkupSafe*"
      sqlalchemy:
        patterns:
          - "sqlalchemy*"
          - "SQLAlchemy*"
      security:
        patterns:
          - "cryptography*"
          - "pyOpenSSL*"
      other:
        patterns:
          - "*"
