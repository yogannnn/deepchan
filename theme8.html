<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeepChan — Minimal Paper</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    color:#222;
    font-family:system-ui,sans-serif;
}

.wrapper{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    margin-bottom:24px;
}

.logo{
    font-size:32px;
    font-weight:700;
}

.subtitle{
    color:#666;
    margin-top:4px;
}

.nav{
    margin-top:14px;
}

.nav a{
    color:#444;
    margin-right:14px;
    text-decoration:none;
}

.board-title{
    font-size:26px;
    margin-bottom:20px;
}

.thread{
    margin-bottom:20px;
}

.post{
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    padding:16px;
    margin-bottom:12px;
}

.post-header{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:10px;
    color:#666;
    font-size:14px;
}

.name{
    color:#000;
    font-weight:600;
}

.post-text{
    line-height:1.7;
}

.actions{
    margin-top:12px;
    display:flex;
    justify-content:flex-end;
    gap:8px;
}

button{
    background:#f0f0f0;
    border:1px solid #ccc;
    border-radius:8px;
    padding:6px 12px;
    cursor:pointer;
}

button:hover{
    background:#e6e6e6;
}
</style>
</head>

<body>

<div class="wrapper">

<header class="header">

    <div class="logo">DeepChan</div>

    <div class="subtitle">
        clean anonymous discussion
    </div>

    <div class="nav">
        <a href="#">Главная</a>
        <a href="#">Каталог</a>
        <a href="#">Архив</a>
    </div>

</header>

<div class="board-title">
    /tech/ — технологии
</div>

<section class="thread">

    <article class="post">

        <div class="post-header">
            <span class="name">Аноним</span>
            <span>17.05.26 18:50</span>
            <span>#901</span>
        </div>

        <div class="post-text">
            Почему современные борды выглядят либо как 2008 год,
            либо как Discord-клоны?
        </div>

        <div class="actions">
            <button>Ответ</button>
            <button>⚠</button>
        </div>

    </article>

    <article class="post">

        <div class="post-header">
            <span class="name">Аноним</span>
            <span>17.05.26 18:52</span>
            <span>#902</span>
        </div>

        <div class="post-text">
            Потому что нормального UX почти никто не делает.
        </div>

    </article>

</section>

</div>

</body>
</html>
