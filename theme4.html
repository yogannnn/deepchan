<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DeepChan Retro</title>

<style>
body{
    margin:0;
    background:#d6daf0;
    color:#000;
    font-family:Verdana,sans-serif;
    font-size:13px;
}

.top{
    background:#0f0c5d;
    color:#fff;
    padding:10px;
    border-bottom:3px solid #34345c;
}

.top h1{
    margin:0;
    font-size:24px;
}

.menu{
    margin-top:6px;
    font-size:12px;
}

.menu a{
    color:#c7d5ff;
    text-decoration:none;
    margin-right:12px;
}

.wrapper{
    width:1100px;
    margin:20px auto;
}

.board-title{
    background:#b7c5d9;
    border:1px solid #7d8fa5;
    padding:8px;
    font-weight:bold;
    margin-bottom:15px;
}

.thread{
    margin-bottom:20px;
}

.post{
    background:#f0e0d6;
    border:1px solid #d9bfb7;
    padding:10px;
    margin-left:20px;
    margin-bottom:8px;
}

.post-header{
    margin-bottom:8px;
}

.name{
    color:#117743;
    font-weight:bold;
}

.trip{
    color:#228854;
}

.date{
    color:#555;
}

.post-id a{
    color:#000;
    text-decoration:none;
}

.post-text{
    line-height:1.5;
}

.post-actions{
    margin-top:10px;
    text-align:right;
}

.post-actions button{
    background:#d6daf0;
    border:1px solid #7d8fa5;
    padding:2px 6px;
    font-size:12px;
    cursor:pointer;
}

.post-actions button:hover{
    background:#c2c8e0;
}

.footer{
    text-align:center;
    margin:40px 0;
    color:#555;
    font-size:12px;
}
</style>
</head>

<body>

<div class="top">
    <h1>DeepChan</h1>

    <div class="menu">
        <a href="#">Главная</a>
        <a href="#">Каталог</a>
        <a href="#">Архив</a>
        <a href="#">FAQ</a>
    </div>
</div>

<div class="wrapper">

    <div class="board-title">
        /i2p/ — Анонимные сети
    </div>

    <div class="thread">

        <div class="post">

            <div class="post-header">
                <span class="name">Аноним</span>
                <span class="trip">◆kLh7cSYnb8</span>
                <span class="date">17.05.26 14:33</span>
                <span class="post-id">
                    <a href="#">№228</a>
                </span>
            </div>

            <div class="post-text">
                Кто-нибудь вообще помнит старые hiddenchan-архивы?
            </div>

            <div class="post-actions">
                <button>Ответ</button>
                <button>👻</button>
                <button>🗑</button>
            </div>

        </div>

    </div>

</div>

<div class="footer">
    Powered by DeepChan
</div>

</body>
</html>
