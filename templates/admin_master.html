{% extends 'admin/base.html' %}

{% block head_css %}
    {{ super() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Полное переопределение Bootstrap для админки */
        body {
            background: #0a0f0a !important;
            color: #b3ffb3 !important;
            padding-top: 50px;
        }
        .navbar {
            background: #0d140d !important;
            border-bottom: 1px solid #1e3b1e !important;
        }
        .navbar-brand, .navbar-nav > li > a {
            color: #66ff66 !important;
        }
        .container {
            max-width: 1200px;
        }
        
        /* Таблицы */
        .table {
            background: #0d140d !important;
            color: #b3ffb3 !important;
            border-collapse: collapse;
        }
        .table > thead > tr > th {
            background: #1a2a1a !important;
            color: #66ff66 !important;
            border-bottom: 2px solid #2a6e2a !important;
        }
        .table > tbody > tr > td {
            background: #0d140d !important;
            color: #b3ffb3 !important;
            border-top: 1px solid #1e3b1e !important;
        }
        .table-hover > tbody > tr:hover {
            background-color: #1e2e1e !important;
        }
        .table-hover > tbody > tr:hover > td {
            background-color: #1e2e1e !important;
        }
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: #111811 !important;
        }
        .table-striped > tbody > tr:nth-of-type(odd) > td {
            background-color: #111811 !important;
        }
        
        /* Кнопки */
        .btn {
            background: #1a2a1a !important;
            border: 1px solid #2a6e2a !important;
            color: #b3ffb3 !important;
        }
        .btn:hover {
            background: #2a4a2a !important;
            color: #fff !important;
        }
        .btn-primary {
            background: #2a4a2a !important;
            border-color: #33cc33 !important;
        }
        
        /* Формы */
        .form-control {
            background: #050805 !important;
            border: 1px solid #1e3b1e !important;
            color: #b3ffb3 !important;
        }
        
        /* Пагинация */
        .pagination > li > a {
            background: #0d140d !important;
            border: 1px solid #1e3b1e !important;
            color: #66ff66 !important;
        }
        .pagination > .active > a {
            background: #1e2e1e !important;
            border-color: #33cc33 !important;
            color: #b3ffb3 !important;
        }
        
        /* Выпадающие меню */
        .dropdown-menu {
            background: #0d140d !important;
            border: 1px solid #1e3b1e !important;
        }
        .dropdown-menu > li > a {
            color: #b3ffb3 !important;
        }
        .dropdown-menu > li > a:hover {
            background: #1e2e1e !important;
        }
        
        /* Убираем белые фоны у любых элементов */
        * {
            background-color: transparent !important;
        }
        body, .container, .navbar, .table, .btn, .form-control, .pagination a {
            background-color: inherit;
        }
    </style>
{% endblock %}

{% block brand %}
    <a class="navbar-brand" href="{{ url_for('admin.index') }}">⚙️ Админка</a>
{% endblock %}

{% block access_control %}
    <ul class="nav navbar-nav navbar-right">
        <li><a href="{{ url_for('main.index') }}">← На главную</a></li>
    </ul>
{% endblock %}
