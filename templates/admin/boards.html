{% extends "admin/base.html" %}
{% block admin_content %}
<h2>Управление досками</h2>
<a href="{{ url_for('admin_create_board') }}" class="btn">➕ Создать доску</a>
<hr>
<table class="admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Короткое имя</th>
            <th>Название</th>
            <th>Описание</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for board in boards %}
        <tr>
            <td>{{ board.id }}</td>
            <td>/{{ board.short_name }}/</td>
            <td>{{ board.name }}</td>
            <td>{{ board.description }}</td>
            <td class="actions">
                <a href="{{ url_for('admin_edit_board', board_id=board.id) }}" class="action-icon">✏️</a>
                <form method="post" action="{{ url_for('admin_delete_board', board_id=board.id) }}" class="inline-form" onsubmit="return confirm('Удалить доску {{ board.short_name }}?');">
                    <button type="submit" class="action-icon">🗑️</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
