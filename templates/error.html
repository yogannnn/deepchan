<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ошибка</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Ошибка</h1>
    {% if form and form.errors %}
    <ul class="errorlist">
    {% for field, errors in form.errors.items() %}
        <li>{{ field }}: {{ errors|join(', ') }}</li>
    {% endfor %}
    </ul>
    {% endif %}
    {% if description %}
    <p>{{ description }}</p>
    {% endif %}
    <p><a href="javascript:history.back()">← Назад</a></p>
</div>
</body>
</html>
