{% extends "base.html" %}
{% block title %}404 — Не найдено{% endblock %}
{% block content %}
<div style="text-align: center; margin-top: 50px;">
    <h2 style="color: var(--error);">🕵️ 404 — Не найдено</h2>
    <p style="color: var(--text-dim);">{{ description or 'Страница исчезла, как твои шансы на успех. Возможно, её никогда и не было.' }}</p>
    <p><a href="{{ url_for('main.index') }}" style="color: var(--accent);">← На главную, пока не потерялся окончательно</a></p>
</div>
{% endblock %}
