{% extends "base.html" %}
{% block title %}404 — Не найдено{% endblock %}
{% block content %}
<div style="text-align: center; margin-top: 50px;">
    <h2 style="color: var(--error);">🔍 404 — Не найдено</h2>
    <p style="color: var(--text-dim);">{{ description or 'Страница, которую вы ищете, не существует или была удалена.' }}</p>
    <p><a href="{{ url_for('main.index') }}" style="color: var(--accent);">← На главную</a></p>
</div>
{% endblock %}
